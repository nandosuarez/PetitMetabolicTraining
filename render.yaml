services:
  - type: web
    name: petit-metabolic-training-app
    runtime: node
    plan: starter
    region: virginia
    buildCommand: npm install
    preDeployCommand: npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Bogota
      - key: DATABASE_URL
        fromDatabase:
          name: petit-metabolic-training-db
          property: connectionString
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        value: Administrador Petit

databases:
  - name: petit-metabolic-training-db
    databaseName: petit_metabolic_training
    user: metabolic
    postgresMajorVersion: "17"
    plan: basic-256mb
    region: virginia
    diskSizeGB: 1
    ipAllowList: []
